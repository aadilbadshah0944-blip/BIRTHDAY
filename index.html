<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise for Sana</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            /* Cake and Chocolate Background */
            background: url('https://img.freepik.com');
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Pink Glassmorphism Login Box */
        #login-box {
            background: rgba(255, 182, 193, 0.9);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            width: 350px;
            border: 4px solid #ff4d6d;
            backdrop-filter: blur(5px);
        }

        h2 { color: #c9184a; font-size: 28px; margin-bottom: 20px; text-shadow: 1px 1px 2px white; }

        input {
            width: 90%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #ff4d6d;
            border-radius: 50px;
            text-align: center;
            font-size: 16px;
        }

        button {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            margin-top: 15px;
        }

        button:hover { background: #c9184a; transform: scale(1.1); transition: 0.3s; }

        /* Surprise Display */
        #surprise-content {
            display: none;
            background: #fff0f3;
            padding: 50px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 6px double #ff4d6d;
            animation: heartBeat 1.5s infinite;
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .cake-icon { font-size: 80px; }
    </style>
</head>
<body>

    <!-- Login Section -->
    <div id="login-box">
        <h2>🎂 Sana's Birthday Portal 🍫</h2>
        <input type="text" id="username" placeholder="Login ID (Sana)" value="Sana" readonly>
        <input type="password" id="dob" placeholder="Enter Password (DDMMYYYY)">
        <p style="color: #c9184a; font-size: 13px;"><b>Hint:</b> Your Birthday Date</p>
        <button onclick="checkLogin()">Unlock My Heart ❤️</button>
    </div>

    <!-- Surprise Section -->
    <div id="surprise-content">
        <div class="cake-icon">🎂</div>
        <h1 style="color: #ff4d6d; font-size: 35px;">Happy Birthday, Sana! ❤️</h1>
        <p style="font-size: 20px; color: #555;">मेरे जीवन की सबसे प्यारी चॉकलेट और सबसे स्वीट केक को जन्मदिन की ढेर सारी बधाई!</p>
        <div style="font-size: 40px; margin: 20px;">🌹🍫🎁</div>
        <p style="font-weight: bold; font-size: 22px; color: #ff4d6d;">9 April 2004</p>
        <p>You make my life delicious! 😘</p>
    </div>

    <script>
        function checkLogin() {
            var user = document.getElementById("username").value;
            var pass = document.getElementById("dob").value;

            // Password Check: 09042004
            if (user.toLowerCase() === "sana" && pass === "09042004") {
                document.getElementById("login-box").style.display = "none";
                document.getElementById("surprise-content").style.display = "block";
                document.body.style.background = "#ffe5ec";
            } else {
                alert("Incorrect Password, Sana! Hint: 09042004");
            }
        }
    </script>

</body>
</html>
